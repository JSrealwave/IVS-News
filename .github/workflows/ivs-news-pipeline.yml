
name: IVS News Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * *'   # Daily at 6 AM PDT
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-24.04   # Updated to newer runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run IVS News Pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python pipeline.py --run --model grok-4-1-fast-non-reasoning