name: IVS News Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * *'     # Runs at 13:00 UTC = 6:00 AM PDT (adjust if needed)
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv (fast package manager)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Run IVS News Pipeline
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          source .venv/bin/activate
          python pipeline.py --run

      - name: Commit updated articles.json (optional backup)
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add articles.json
          git commit -m "Update articles.json from daily run" || echo "No changes to commit"
          git push
        continue-on-error: true
